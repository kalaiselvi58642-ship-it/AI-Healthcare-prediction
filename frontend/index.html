<!DOCTYPE html>
<html>

<head>

<title>AI Healthcare Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>
    <script>
if(!localStorage.getItem("role")){
window.location.href="login.html"
}
</script>

<div class="sidebar">

<h2>🏥 HealthAI</h2>

<ul>
<li onclick="window.location.href='index.html'">Dashboard</li>
<li onclick="window.location.href='patients.html'">Patients</li>
<li onclick="window.location.href='report.html'">Reports</li>
<li onclick="window.location.href='settings.html'">Settings</li>
</ul>

</div>


<div class="main">

<div class="header">
<h1>AI Healthcare Monitoring System</h1>
</div>


<div class="cards">

<div class="card">

<h3>Patient Input</h3>
<input id="name" placeholder="Patient Name">
<input id="age" placeholder="Age">
<input id="bp" placeholder="Blood Pressure">
<input id="sugar" placeholder="Sugar Level">
<input id="cholesterol" placeholder="Cholesterol">

<button onclick="predict()">Analyze Health</button>

</div>


<div class="card">

<h3>Prediction Result</h3>

<h2 id="result">--</h2>

<p id="recommendation"></p>

<h3 id="score"></h3>

<p id="status"></p>


</div>


<div class="card">

<h3>Health Indicators</h3>

<canvas id="healthChart"></canvas>

</div>

</div>

</div>


<script src="script.js"></script>

</body>


</html>
