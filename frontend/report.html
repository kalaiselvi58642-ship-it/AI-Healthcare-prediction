<!DOCTYPE html>
<html>
<head>
<title>Hospital Reports</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f9;
transition:0.3s;
}

.dark{
background:#1e1e2f;
color:white;
}

/* Header */
.header{
background:#2c7be5;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

/* Container */
.container{
width:90%;
margin:20px auto;
}

/* Cards */
.cards{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.card{
flex:1;
background:white;
padding:15px;
border-radius:10px;
text-align:center;
}

.dark .card{
background:#2b2b3c;
}

/* Chart */
.chart{
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
}

.dark .chart{
background:#2b2b3c;
}

button{
padding:8px 12px;
border:none;
background:black;
color:white;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>
    <script>
if(!localStorage.getItem("role")){
window.location.href="login.html"
}
</script>

<div class="header">
<h2>🏥Hospital Reports</h2>
<button onclick="toggleMode()">🌙 Dark Mode</button>
</div>

<div class="container">

<div class="cards">
<div class="card"><h3>Total</h3><h1 id="total"></h1></div>
<div class="card"><h3>Healthy</h3><h1 id="healthy"></h1></div>
<div class="card"><h3>Moderate</h3><h1 id="moderate"></h1></div>
<div class="card"><h3>High Risk</h3><h1 id="high"></h1></div>
</div>

<div class="chart">
<canvas id="chart"></canvas>
</div>

</div>

<script>

function toggleMode(){
document.body.classList.toggle("dark")
}

fetch("http://127.0.0.1:5000/patients")
.then(res=>res.json())
.then(data=>{

let total=data.length
let healthy=0, moderate=0, risk=0, high=0

data.forEach(p=>{
if(p[7]=="Very Healthy") healthy++
else if(p[7]=="Moderate") moderate++
else if(p[7]=="Risk") risk++
else high++
})

document.getElementById("total").innerText=total
document.getElementById("healthy").innerText=healthy
document.getElementById("moderate").innerText=moderate
document.getElementById("high").innerText=high

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Healthy","Moderate","Risk","High"],
datasets:[{
data:[healthy,moderate,risk,high]
}]
}
})

})

</script>

</body>
</html>
