<!DOCTYPE html>
<html>
<head>
<title>Patients</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

h2{
text-align:center;
margin-top:20px;
}

table{
width:90%;
margin:20px auto;
border-collapse:collapse;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

th, td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#3498db;
color:white;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.edit-btn{
background:#f39c12;
color:white;
}

.delete-btn{
background:#e74c3c;
color:white;
}
</style>

</head>

<body>
    <script>
if(!localStorage.getItem("role")){
window.location.href="login.html"
}
</script>

<h2>👨‍⚕Patient Records</h2>

<table>
<thead>
<tr>

<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>BP</th>
<th>Sugar</th>
<th>Cholesterol</th>
<th>Risk</th>
<th>Score</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

fetch("http://127.0.0.1:5000/patients")
.then(res => res.json())
.then(data => {

let table = document.getElementById("tableBody")
table.innerHTML = ""

data.forEach(p => {

let row = `<tr>
<td>${p[0]}</td>
<td>${p[1]}</td>
<td>${p[2]}</td>
<td>${p[3]}</td>
<td>${p[4]}</td>
<td>${p[5]}</td>
<td>${p[6]}</td>
<td>${p[7]}</td>
<td>
<button class="edit-btn" onclick="editPatient(${p[0]}, ${p[1]}, ${p[2]}, ${p[3]}, ${p[4]})">Edit</button>
<button class="delete-btn" onclick="deletePatient(${p[0]})">Delete</button>
</td>
</tr>`

table.innerHTML += row

})

})

function deletePatient(id){
fetch(`http://127.0.0.1:5000/delete/${id}`,{method:"DELETE"})
.then(()=>{alert("Deleted"); location.reload()})
}

function editPatient(id,name, age, bp, sugar, cholesterol){
let newName = prompt("Name", name)
let newAge = prompt("Age", age)
let newBp = prompt("BP", bp)
let newSugar = prompt("Sugar", sugar)
let newChol = prompt("Cholesterol", cholesterol)

fetch(`http://127.0.0.1:5000/update/${id}`,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
name:newName,
age:newAge,
bp:newBp,
sugar:newSugar,
cholesterol:newChol
})
})
.then(()=>{alert("Updated"); location.reload()})
}

</script>

</body>
</html>
